name: "LogosPOS: Respaldo de Datos Completo"

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 AM UTC
  workflow_dispatch:   # Ejecución manual

jobs:
  run_full_dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Postgres Client
        run: |
          # Añadir el repositorio oficial de PostgreSQL para conseguir la versión 17
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # Instalamos específicamente el cliente 17
          sudo apt-get install -y postgresql-client-17

      - name: Procesar Proyectos Activos
        env:
          # Mapea aquí tus secretos
          DB_URL_RESTAURANT: ${{ secrets.DB_URL_RESTAURANT }}
        run: |
          FECHA=$(date +%Y-%m-%d)
          # Guardamos la fecha para el siguiente paso de Git
          echo "FECHA_BACKUP=$FECHA" >> $GITHUB_ENV
          
          jq -c '.proyectos[] | select(.activo == true)' config.json | while read proy; do
            ID=$(echo $proy | jq -r '.id')
            SECRET_NAME=$(echo $proy | jq -r '.secret_name')
            URL_CONEXION=${!SECRET_NAME}
            
            echo "Iniciando respaldo completo para: $ID"
            
            if [ -z "$URL_CONEXION" ]; then
              echo "Error: El secreto $SECRET_NAME no existe."
              continue
            fi

            mkdir -p "backups/$ID"
            # Extraemos el host de la URL para forzar la resolución IPv4
            HOST=$(echo "$URL_CONEXION" | sed -e 's|.*@||' -e 's|:.*||')
            pg_dump --host=$HOST "$URL_CONEXION" > "backups/$ID/${ID}_full_$FECHA.sql"
            echo "Respaldo de $ID completado."
          done

      - name: Guardar en Repositorio Privado
        run: |
          git config --local user.email "backup-bot@logospos.com"
          git config --local user.name "LogosPOS Backup System"
          git add backups/
          # Usamos la variable de entorno directa de Linux ($FECHA_BACKUP)
          git commit -m "Backup Global Completo - $FECHA_BACKUP" || echo "No hay cambios para subir"
          git push
