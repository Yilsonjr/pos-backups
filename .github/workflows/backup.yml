name: Supabase Backup

on:
  schedule:
    - cron: '0 3 * * *' # Todos los dias 3AM UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
      
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
      
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
      
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create backup
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          mkdir -p backups
          
          /usr/lib/postgresql/17/bin/pg_dump \
            -h ${{ secrets.DB_HOST }} \
            -p 6543 \
            -U ${{ secrets.DB_USER }} \
            -d postgres \
            -v \
            -F c \
            -f backups/backup_$(date +%Y%m%d_%H%M%S).backup

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backups/
