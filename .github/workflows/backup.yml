name: "LogosPOS: Respaldo de Datos Completo"

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 AM UTC
  workflow_dispatch:   # Ejecución manual

jobs:
  run_full_dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # PASO 1: Instalar herramientas necesarias (v17 para Supabase)
      - name: Instalar Postgres Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 lsb-release
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      # PASO 2: Crear los respaldos desde Supabase
      - name: Procesar Proyectos Activos
        env:
          DB_URL_RESTAURANT: ${{ secrets.DB_URL_RESTAURANT }}
        run: |
          FECHA=$(date +%Y-%m-%d)
          echo "FECHA_BACKUP=$FECHA" >> $GITHUB_ENV
          
          # Aseguramos que la carpeta exista
          mkdir -p backups
          
          jq -c '.proyectos[] | select(.activo == true)' config.json | while read proy; do
            ID=$(echo $proy | jq -r '.id')
            SECRET_NAME=$(echo $proy | jq -r '.secret_name')
            URL_CONEXION=${!SECRET_NAME}
            
            echo "Iniciando respaldo para: $ID"
            
            if [ -z "$URL_CONEXION" ]; then
              echo "Error: El secreto $SECRET_NAME no existe."
              continue
            fi

            mkdir -p "backups/$ID"
            HOST=$(echo "$URL_CONEXION" | sed -e 's|.*@||' -e 's|:.*||')
            
            # Ejecución del dump
            pg_dump -h "$HOST" "$URL_CONEXION" > "backups/$ID/${ID}_full_$FECHA.sql"
            echo "Respaldo de $ID completado."
          done

      # PASO 3: Guardar los archivos resultantes en el repositorio
      - name: Guardar en Repositorio Privado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "backup-bot@logospos.com"
          git config --local user.name "LogosPOS Backup System"
          
          # Agregamos los archivos creados
          if [ -d "backups" ]; then
            git add backups/
            if git diff --staged --quiet; then
              echo "No hay cambios nuevos hoy."
            else
              git commit -m "Backup Global Completo - $FECHA_BACKUP"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            fi
          fi
